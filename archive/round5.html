<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .stage5-card { padding: 3rem 2rem; max-width: 800px; margin: auto; }
    .s5-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; border-bottom: 2px dashed var(--text-secondary); padding-bottom: 1rem; margin-bottom: 2rem; }
    .s5-header h2 { margin: 0; color: var(--text-main); }
    .quiz-nav-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .quiz-nav-btns .classic-btn { width: auto; padding: 0.45rem 0.9rem; font-size: 0.95rem; }
    .quiz-pause-overlay {
      position: fixed; inset: 0; z-index: 12000; background: rgba(0,0,0,0.55);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
      backdrop-filter: blur(4px);
    }
    .quiz-pause-overlay.hidden { display: none !important; }
    .quiz-pause-overlay p { color: #fff; font-size: 1.5rem; font-weight: 700; }
    .r5-quote { font-size: 1.2rem; line-height: 1.6; color: var(--accent-primary); font-style: italic; margin: 1.5rem 0 2rem; }
    
    .meaning-display { font-size: 1.8rem; line-height: 1.6; text-align: center; margin-bottom: 3rem; font-family: var(--font-serif); font-style: italic; color: var(--accent-primary); }
    
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    
    .option-btn {
      background: var(--bg-light);
      border: 2px solid var(--accent-primary);
      border-radius: 8px;
      padding: 1.5rem 1rem;
      font-size: 1.5rem;
      font-family: var(--font-serif);
      font-weight: bold;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 2px 4px 6px rgba(0,0,0,0.1);
      text-transform: capitalize;
    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 2px 6px 12px rgba(0,0,0,0.2);
      border-color: var(--accent-primary);
    }
    .option-btn:disabled { cursor: default; }
    
    .option-btn.correct { background: #e8f5e9 !important; border-color: #2e7d32 !important; color: #2e7d32 !important; box-shadow: 0 0 15px rgba(76,175,80,0.5) !important; animation: pop 0.3s ease; }
    .option-btn.wrong { background: #ffebee !important; border-color: #c62828 !important; color: #c62828 !important; box-shadow: 0 0 15px rgba(244,67,54,0.5) !important; animation: shake 0.4s ease; opacity: 0.8;}
    
    .feedback { font-size: 2rem; text-align: center; height: 3rem; margin-top: 1rem; font-weight: bold; }
    .feedback.success { color: #2e7d32; }
    .feedback.error { color: #c62828; }
    
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
    
    .scoreboard { position: fixed; top: 1.5rem; right: 1.5rem; background: #4caf50; color: #ffffff; padding: 0.8rem 1.5rem; border-radius: 8px; border: 3px solid #2e7d32; font-family: 'Courier New', Courier, monospace; font-size: 2.5rem; font-weight: 900; z-index: 9999; box-shadow: 0 8px 20px rgba(0,0,0,0.5); text-transform: uppercase; }
    .floating-point { position: absolute; color: #4caf50; font-weight: bold; font-family: monospace; font-size: 2rem; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 200; text-shadow: 1px 1px 2px #000; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1.5); } 100% { opacity: 0; transform: translateY(-50px) scale(1); } }
  </style>
</head>
<body>
  <div class="scoreboard" id="scoreboard" style="display:none;">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    
    <!-- Finish Hard Intro -->
    <div id="intro-container" class="card stage5-card parchment-large" style="text-align:center;">
      <h1 style="font-size:2rem; color:var(--text-main); margin-bottom:1rem; line-height:1.2;">Juniour Prefessional</h1>
      <p style="font-size:1.1rem; color:var(--text-secondary); margin-bottom:2rem; line-height:1.6;">
        You read a meaning and select the right word from the list of words.
      </p>
      <div class="quiz-nav-btns" style="justify-content:center; margin-bottom:1rem;">
        <button type="button" id="r5-intro-back-btn" class="classic-btn secondary outline">Back</button>
      </div>
      <button id="start-btn" class="classic-btn" style="width:100%; max-width:300px;">Start</button>
    </div>

    <!-- Quiz Container -->
    <div id="quiz-container" class="card stage5-card parchment-large" style="display:none;">
      <div class="s5-header">
        <h2>Juniour Prefessional</h2>
        <div class="quiz-nav-btns">
          <button type="button" id="r5-pause-btn" class="classic-btn secondary outline">Pause</button>
          <button type="button" id="r5-back-btn" class="classic-btn secondary outline">Back</button>
        </div>
        <div id="quiz-progress" style="font-size:1.5rem; font-weight:bold;">1/5</div>
      </div>
      
      <div class="meaning-display" id="r5-meaning">
        <!-- Meaning goes here -->
      </div>
      
      <div class="options-grid" id="options-container">
        <!-- 4 buttons go here -->
      </div>
      
      <div id="r5-feedback" class="feedback"></div>
      
      <div style="text-align:center;">
         <button id="next-btn" class="classic-btn secondary" style="display:none; width:100%; max-width:300px; margin-top:2rem;">Next Question</button>
      </div>
    </div>

    <div id="r5-complete" class="card stage5-card parchment-large" style="display:none; text-align:center;">
      <h2 style="margin-top:0;">Stage done</h2>
      <p id="r5-motivation-quote" class="r5-quote" aria-live="polite"></p>
      <button type="button" id="r5-continue-btn" class="classic-btn" style="max-width:320px; width:100%;">Continue</button>
    </div>
    
  </div>
  <div id="r5-pause-overlay" class="quiz-pause-overlay hidden" aria-hidden="true">
    <p>Paused</p>
    <button type="button" id="r5-resume-btn" class="classic-btn primary">Resume</button>
  </div>
  <script src="wordBank.js"></script>
  <script src="shared.js"></script>
  <script src="round5.js"></script>
</body>
</html>
