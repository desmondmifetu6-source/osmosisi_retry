<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Level 1 Stage 5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .stage5-card { padding: 2rem; max-width: 600px; margin: auto; }
    .s5-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--text-secondary); padding-bottom: 1rem; margin-bottom: 1.5rem; }
    .s5-header h2 { margin: 0; }
    
    .alarming-timer { font-size: 2rem; font-weight: bold; font-family: monospace; background: var(--text-main); color: var(--surface-white); padding: 0.5rem 1rem; border-radius: 4px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
    .pulse-red { color: #ff5252; animation: pulseRed 0.8s infinite alternate; background: #3e0b0b; border: 1px solid #ff5252; }
    @keyframes pulseRed { from { box-shadow: 0 0 5px red; } to { box-shadow: 0 0 20px red; } }
    
    .test-area { text-align: center; margin-bottom: 2rem; }
    .s5-input { width: 80%; font-size: 1.5rem; text-align: center; font-weight: bold; letter-spacing: 2px; border-bottom: 3px solid var(--text-main); border-radius:0; }
    
    .feedback { height: 2rem; font-weight: bold; margin-bottom: 1rem; font-size: 1.2rem; }
    .feedback.success { color: #2e7d32; }
    .feedback.error { color: #c62828; }
    
    .red-alert-theme { background: var(--bg-light) !important; border-color: #c62828 !important; }
    .word-tile { display: inline-block; background: var(--bg-light); color: var(--text-main); padding: 0.4rem 1rem; border: 1px solid #d3cbb8; box-shadow: 1px 2px 3px rgba(0,0,0,0.2); font-family: var(--font-serif); font-size: 1.1rem; font-weight: bold; margin: 0.3rem; }
    
    .scoreboard { position: fixed; top: 1.5rem; right: 1.5rem; background: #4caf50; color: #ffffff; padding: 0.8rem 1.5rem; border-radius: 8px; border: 3px solid #2e7d32; font-family: 'Courier New', Courier, monospace; font-size: 2.5rem; font-weight: 900; z-index: 9999; box-shadow: 0 8px 20px rgba(0,0,0,0.5); text-transform: uppercase; }
    .floating-point { position: absolute; color: #4caf50; font-weight: bold; font-family: monospace; font-size: 2rem; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 200; text-shadow: 1px 1px 2px #000; }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1.5); }
      100% { opacity: 0; transform: translateY(-50px) scale(1); }
    }
  </style>
</head>
<body>
  <div class="scoreboard" id="scoreboard" style="display:none;">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    
    <div id="transition-container" class="card stage5-card" style="text-align: center;">
      <h2 style="font-size: 3rem; color: var(--accent-red); margin-bottom: 1rem; text-shadow: 0px 2px 4px rgba(0,0,0,0.3);">Total Recall</h2>
      <p style="font-size:1.2rem; margin-bottom:2rem;">Now, under immense pressure, type as many of your selected words as you can recollect from memory.</p>
      <button id="start-stage-btn" class="classic-btn">Begin Recall</button>
    </div>

    <!-- Exam Container -->
    <div id="exam-container" class="card stage5-card red-alert-theme" style="display: none;">
      <div class="s5-header">
        <h2 style="color: #c62828;">Recollect Words</h2>
        <div id="exam-timer" class="alarming-timer pulse-red">00:30</div>
      </div>
      <p style="font-weight:bold; margin-bottom:1rem;">Recall all words</p>
      <div class="test-area" style="margin-bottom:1rem;">
        <input type="text" id="exam-input" class="s5-input" autocomplete="off" style="border-color:#c62828;">
        <div id="exam-feedback" class="feedback" style="font-size:1rem; margin-top:0.5rem; height:1.5rem;"></div>
      </div>
      <div id="exam-words-list" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; min-height:100px; padding:1rem; background:rgba(255,255,255,0.3); border-radius:4px;"></div>
    </div>

  </div>
  <script src="wordBank.js"></script>
  <script src="shared.js"></script>
  <script src="l1_stage5.js"></script>
</body>
</html>
