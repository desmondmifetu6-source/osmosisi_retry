<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Hall of Fame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .nd-card {
      max-width: 800px;
      margin: auto;
      padding: 3rem;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
    }

    .boss-heading {
      margin-bottom: 0.5rem;
      text-align: center;
      font-size: 2.2rem;
      color: #111111;
      font-weight: 700;
    }

    .boss-subtitle {
      text-align: center;
      font-size: 1.1rem;
      color: #555555;
      margin-bottom: 2rem;
    }

    .nd-progress {
      font-weight: 500;
      margin-bottom: 0.6rem;
      color: #777777;
    }

    .nd-memory-box {
      min-height: 150px;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      background: #fafafa;
      padding: 1.5rem;
      margin: 0.75rem 0 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .nd-word {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #111111;
    }

    .nd-meaning {
      color: #555555;
      line-height: 1.5;
      max-width: 95%;
      font-size: 1.05rem;
    }

    .nd-hidden-note {
      color: #777777;
      font-weight: 500;
    }

    .nd-input {
      width: 100%;
      margin-bottom: 1rem;
    }

    .nd-input input,
    .nd-input textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d4d4d4;
      border-radius: 4px;
      background: #ffffff;
      padding: 0.8rem 1rem;
      color: #111111;
      font-size: 1.05rem;
      font-family: inherit;
    }

    .nd-input input::placeholder,
    .nd-input textarea::placeholder {
      color: #999999;
    }

    .nd-input input:focus,
    .nd-input textarea:focus {
      outline: none;
      border-color: #111111;
    }

    .nd-input textarea {
      min-height: 100px;
      resize: vertical;
    }

    .nd-feedback {
      min-height: 1.5rem;
      font-weight: 500;
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    .nd-feedback.ok {
      color: #15803d;
    }

    .nd-feedback.partial {
      color: #ea580c;
    }

    .nd-feedback.bad {
      color: #b91c1c;
    }

    .nd-reveal {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      padding: 1rem;
      margin-top: 1rem;
      border-radius: 4px;
      display: none;
      color: #111111;
    }

    .nd-reveal strong {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #111111;
    }

    .boss-btn {
      flex: 1;
      background: #111111;
      color: #ffffff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 4px;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .boss-btn:hover {
      background: #333333;
    }

    .boss-btn.secondary {
      background: #f5f5f5;
      color: #333333;
      border: 1px solid #d4d4d4;
    }

    .boss-btn.secondary:hover {
      background: #e5e5e5;
      color: #111111;
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    <div class="nd-card">
      <div id="nd-progress" class="nd-progress"></div>
      <div id="nd-memory-box" class="nd-memory-box"></div>

      <div id="nd-input-wrap" style="display:none;">
        <div class="nd-input">
          <input type="text" id="nd-word-input" autocomplete="off" spellcheck="false"
            placeholder="Type the word you saw">
        </div>
        <div class="nd-input">
          <textarea id="nd-meaning-input" placeholder="Type the meaning you saw"></textarea>
        </div>
      </div>

      <div id="nd-feedback" class="nd-feedback" aria-live="polite"></div>
      <div id="nd-reveal" class="nd-reveal">
        <strong id="nd-reveal-word"></strong>
        <p id="nd-reveal-meaning" style="margin:0;"></p>
      </div>

      <div style="display:flex; gap:0.75rem; margin-top:1rem;">
        <button id="nd-back-btn" class="boss-btn secondary">Back</button>
        <button id="nd-main-btn" class="boss-btn">Start</button>
      </div>
    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="09_stage7_boss_phase.js"></script>
</body>

</html>
