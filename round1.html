<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .stage1-board {
      background: linear-gradient(135deg, #305e19, #1b2e10);
      border: 4px solid #D4AF37;
      border-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
      padding: 1.5rem;
      color: var(--parchment);
      max-width: 450px;
      margin: auto;
    }
    .stage1-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px dashed #D4AF37;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .target-display {
      font-size: 1.8rem;
      font-family: var(--font-serif);
      color: var(--parchment);
    }
    .target-display strong {
      color: var(--gold);
      text-shadow: 0 0 10px rgba(184, 153, 71, 0.5);
      font-size: 2.2rem;
    }
    .timer-display {
      font-size: 1.5rem;
      font-weight: bold;
      background: #15220c;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: 2px solid #D4AF37;
      color: var(--parchment);
      box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
    }
    .instruction-text {
      font-style: italic;
      margin-bottom: 1.5rem;
      text-align: center;
      color: var(--parchment-dark);
    }
    .plank-column {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 55vh;
      overflow-y: auto;
      padding-right: 0.8rem;
    }
    .plank-column::-webkit-scrollbar { width: 8px; }
    .plank-column::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
    .plank-column::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }

    .wooden-plank {
      background: linear-gradient(to right, #3c781d, #305e19, #3c781d);
      border: 2px solid #254515;
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      font-family: var(--font-serif);
      color: #ffffff;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.9), 0 0 8px rgba(255,255,255,0.3);
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.05);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* Wood grain subtle overlay */
    .wooden-plank::before {
      content: ""; position: absolute; top:0; left:0; right:0; bottom:0;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 15px, rgba(0,0,0,0.08) 15px, rgba(0,0,0,0.08) 30px);
      pointer-events: none;
    }
    .wooden-plank:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(184, 153, 71, 0.4);
      z-index: 2;
    }
    
    /* Animations */
    .plank-correct {
      background: linear-gradient(to right, #2e7d32, #1b5e20, #2e7d32) !important;
      border-color: #1b5e20 !important;
      box-shadow: 0 0 20px #4caf50 !important;
      animation: pop 0.4s ease;
      color: #ffffff !important;
    }
    .plank-wrong {
      background: linear-gradient(to right, #c62828, #b71c1c, #c62828) !important;
      border-color: #880e4f !important;
      box-shadow: 0 0 20px #f44336 !important;
      animation: shake 0.4s ease;
      color: #ffffff !important;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="card stage1-board">
      <div class="stage1-header">
         <div class="target-display">Your Letter: <strong id="s1-target"></strong></div>
         <div class="timer-display" id="s1-timer">10s</div>
      </div>
      <p class="instruction-text">Find and select the target letter before time runs out!</p>
      
      <div class="plank-column" id="letter-column">
         <!-- Rendered dynamically -->
      </div>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="wordBank.js"></script>
  <script src="round1.js"></script>
</body>
</html>
