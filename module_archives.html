<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Total Score</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .archive-header { text-align: center; margin-bottom: 2rem; animation: floatUp 2s ease-out forwards; text-shadow: 0 0 10px gold; }
    .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .word-tile { 
      background: var(--surface-light); border: 2px solid var(--accent-primary); 
      border-radius: 8px; padding: 1rem; text-align: center; font-weight: bold;
      color: var(--text-primary); transition: transform 0.3s, box-shadow 0.3s;
    }
    .word-tile:hover { transform: scale(1.05); box-shadow: 0 0 8px var(--accent-primary); cursor: default; }
    .mastery-stats { text-align: center; font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--gold); }
  </style>
</head>
<body>
  <div class="app-container" style="max-width: 800px;">
    <h1 class="archive-header" style="color: var(--gold); font-size: 2.5rem;">Total Score</h1>
    
    <div class="card" style="margin-bottom: 2rem; background: rgba(30,30,40, 0.95); border-color: var(--gold);">
      <h2 style="text-align: center; font-family: var(--font-serif);">Total Score Summary</h2>
      <p class="mastery-stats" id="ma-stats">Computing scholar analytics...</p>
      <p class="mastery-stats" id="ma-time" style="font-size:1rem; color: var(--text-secondary);">Time: --</p>
      
    </div>

    <div class="card">
      <h3 style="text-align: center; margin-bottom: 1.5rem; border-bottom: 1px dashed var(--accent-primary); padding-bottom: 0.5rem;">Lexicon Assessed</h3>
      <div class="word-grid" id="ma-word-grid">
        <!-- Words populated via script -->
      </div>
      <div style="text-align: center; margin-top: 2rem;">
        <button id="ma-finish-btn" class="classic-btn primary" style="font-size: 1.1rem; padding: 0.8rem 2rem;">Return to the Library</button>
      </div>
    </div>
  </div>
  
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="module_archives.js"></script>
</body>
</html>
