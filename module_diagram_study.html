<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Diagram Study</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .diagram-engine { position: relative; max-width: 900px; margin: auto; padding: 2rem; text-align: center; }
    .engine-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--text-secondary); padding-bottom: 1rem; margin-bottom: 2rem; }
    .engine-title { font-size: 2.5rem; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; }
    
    .timer { font-size: 2.5rem; color: var(--accent-red, #d32f2f); font-family: monospace; font-weight: bold; }
    
    #image-view { border: 4px solid var(--accent-primary); border-radius: 8px; overflow: hidden; background: #fff; margin-bottom: 2rem; }
    #diagram-img { width: 100%; display: block; }
    
    .round-input { width: 80%; max-width: 400px; font-size: 1.5rem; padding: 1rem; text-align: center; font-family: monospace; border: 2px solid var(--text-main); border-radius: 8px; margin: 0 auto; display:block; outline: none; }
    .round-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 5px rgba(79,70,229,0.5); }
    
    .recalled-grid { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
    .recalled-pill { background: #4caf50; color: #fff; padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; font-family: var(--font-serif); box-shadow: 0 4px 6px rgba(0,0,0,0.2); animation: popIn 0.3s ease; text-transform: capitalize; }
    
    .point-gained { position: fixed; color: #4caf50; font-size: 2.5rem; font-weight: bold; font-family: monospace; z-index: 1000; animation: floatUp 1s ease-out forwards; pointer-events: none;}
    
    .word-bank-item { padding: 0.5rem 1rem; background: var(--bg-light); border: 2px solid #ccc; font-family: var(--font-serif); font-size: 1.1rem; border-radius: 6px; transition: all 0.3s; font-weight: bold; color: var(--text-main); }
    .word-bank-item.found { opacity: 0.2; text-decoration: line-through; border-color: #4caf50; color: #4caf50; background: transparent; transform: scale(0.95); }
    
    @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(0.5); } }
    @keyframes fastPulse { 0%, 100% { opacity: 0; } 25%, 75% { opacity: 1; } }
    
    .blink-twice { animation: fastPulse 0.6s ease-in-out; }
    
    .scoreboard { position: fixed; top: 1.5rem; right: 1.5rem; background: #4caf50; color: #ffffff; padding: 0.8rem 1.5rem; border-radius: 8px; border: 3px solid #2e7d32; font-family: 'Courier New', Courier, monospace; font-size: 2.5rem; font-weight: 900; z-index: 9999; box-shadow: 0 8px 20px rgba(0,0,0,0.5); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>

  <div class="app-container">
    <div class="diagram-engine card parchment-large">
      <div class="engine-header">
        <h2 class="engine-title" id="d-title">Diagram</h2>
        <div id="timer" class="timer" style="display:none;">10</div>
      </div>
      
      <p id="instruction-text" style="font-size:1.2rem; font-style:italic; color:var(--text-secondary); margin-bottom:2rem;"></p>

      <div id="intro-view" style="text-align:center; padding:3rem 1rem;">
        <h3 style="font-size:2rem; margin-bottom:1.5rem; color:var(--text-main);">At the end of all the three rounds you will assimilate the meaning.</h3>
        <button id="begin-btn" class="classic-btn primary">Begin Rounds</button>
      </div>
      
      <div id="image-view" style="display:none;">
        <img id="diagram-img" src="" alt="Diagram">
      </div>
      
      <div id="round1-view" style="display:none; padding:1.5rem; border:2px dashed var(--accent-primary); border-radius:8px;">
        <h3 style="font-size:1.5rem; margin-bottom:1rem; color:var(--text-main);">Round 1: Fill In</h3>
        <div id="r1-word-bank" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom: 2rem;"></div>
        <input type="text" id="r1-input" class="round-input" placeholder="Type a word from the bank..." autocomplete="off" spellcheck="false">
        <div style="margin-top:1.5rem;">
          <button id="r1-skip-btn" class="classic-btn outline" style="width: auto;">Skip Round</button>
        </div>
      </div>

      <div id="round2-view" style="display:none; padding:3rem 1rem; background:rgba(0,0,0,0.02); border-radius:8px; border:1px solid #ddd; text-align:center;">
        <h3 style="font-size:1.5rem; margin-bottom:1rem; color:var(--text-main);">Round 2: Type As They Flash</h3>
        <div id="r2-flash-container" style="min-height: 100px; display:flex; align-items:center; justify-content:center; margin-bottom: 2rem;">
            <div id="r2-flash-word" style="font-size:4rem; font-weight:bold; font-family:var(--font-serif); opacity:0;"></div>
        </div>
        <div id="r2-input-area" style="display:none;">
           <input type="text" id="r2-input" class="round-input" placeholder="Type the flashed word..." autocomplete="off" spellcheck="false">
           <p style="margin-top:1rem; color:var(--text-secondary); font-weight:bold;" id="r2-progress">0/10</p>
           <div style="margin-top:1.5rem;">
             <button id="r2-skip-btn" class="classic-btn outline" style="width: auto;">Skip Word</button>
           </div>
        </div>
      </div>
      
      <div id="recall-view" style="display:none; padding: 2rem; background: rgba(0,0,0,0.05); border: 2px dashed var(--accent-primary); border-radius: 8px;">
        <h3 style="font-size:2rem; margin-bottom:1rem; color:var(--text-main);">Round 3: Total Recall</h3>
        <p style="margin-bottom:1rem; color:var(--text-secondary);">List every part you remember from pure memory.</p>
        <input type="text" id="recall-input" class="round-input" placeholder="Type a label and press Enter..." autocomplete="off" spellcheck="false">
        
        <div class="recalled-grid" id="recalled-list"></div>
        
        <div style="margin-top: 3rem;">
          <button id="finish-btn" class="classic-btn outline">Conclude Trial</button>
        </div>
      </div>
      
    </div>
  </div>
  
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="module_diagram_study.js"></script>
</body>
</html>
