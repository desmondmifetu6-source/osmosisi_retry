<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }
  </style>
  <style>
    .akwaaba-header {
      font-size: 2.8rem;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 2rem;
      border-bottom: 2px dashed var(--text-secondary);
      padding-bottom: 1rem;
    }

    .akwaaba-header span {
      color: var(--accent-primary);
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="card" style="text-align: center;">
      <h2 class="akwaaba-header">WELCOME, <span id="home-username">Scholar</span></h2>
      <p style="margin-bottom: 2rem; color: var(--text-secondary); font-style: italic;">Select your choice.</p>
      <div class="menu-buttons">
        <button id="play-solo-btn" class="classic-btn primary">Play Solo</button>
        <button id="play-friends-btn" class="classic-btn primary" style="background:#0288d1; border-color:#01579b;">Play
          with Friends</button>
        <button id="profile-btn" class="classic-btn secondary">View Profile</button>
        <button id="library-btn" class="classic-btn outline">Dictionary Library</button>
        <button id="about-btn" class="classic-btn outline">About Osmosis Rapid Learning Game</button>
        <button id="diagram-btn" class="classic-btn primary" style="background:#4caf50; border-color:#2e7d32;">Diagram
          Laboratory</button>
        <button id="reset-btn" class="classic-btn" style="background:#e53935; border-color:#b71c1c;">Purge Saved
          Data</button>
      </div>
    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="01_home_menu.js"></script>
</body>

</html>
