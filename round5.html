<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .stage5-card { padding: 3rem 2rem; max-width: 800px; margin: auto; }
    .s5-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--ink-light); padding-bottom: 1rem; margin-bottom: 2rem; }
    .s5-header h2 { margin: 0; color: var(--ink); }
    
    .meaning-display { font-size: 1.8rem; line-height: 1.6; text-align: center; margin-bottom: 3rem; font-family: var(--font-serif); font-style: italic; color: #305e19; }
    
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    
    .option-btn {
      background: linear-gradient(to right, #fdfbf7, #f4ecd8);
      border: 2px solid #D4AF37;
      border-radius: 8px;
      padding: 1.5rem 1rem;
      font-size: 1.5rem;
      font-family: var(--font-serif);
      font-weight: bold;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 2px 4px 6px rgba(0,0,0,0.1);
      text-transform: capitalize;
    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 2px 6px 12px rgba(0,0,0,0.2);
      border-color: var(--gold);
    }
    .option-btn:disabled { cursor: default; }
    
    .option-btn.correct { background: #e8f5e9 !important; border-color: #2e7d32 !important; color: #2e7d32 !important; box-shadow: 0 0 15px rgba(76,175,80,0.5) !important; animation: pop 0.3s ease; }
    .option-btn.wrong { background: #ffebee !important; border-color: #c62828 !important; color: #c62828 !important; box-shadow: 0 0 15px rgba(244,67,54,0.5) !important; animation: shake 0.4s ease; opacity: 0.8;}
    
    .feedback { font-size: 2rem; text-align: center; height: 3rem; margin-top: 1rem; font-weight: bold; }
    .feedback.success { color: #2e7d32; }
    .feedback.error { color: #c62828; }
    
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
    
    .scoreboard { position: fixed; top: 1rem; left: 1rem; background: var(--ink); color: var(--gold); padding: 0.5rem 1rem; border-radius: 4px; font-family: monospace; font-size: 1.5rem; font-weight: bold; z-index: 100; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    .floating-point { position: absolute; color: #4caf50; font-weight: bold; font-family: monospace; font-size: 2rem; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 200; text-shadow: 1px 1px 2px #000; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1.5); } 100% { opacity: 0; transform: translateY(-50px) scale(1); } }
  </style>
</head>
<body>
  <div class="scoreboard" id="scoreboard" style="display:none;">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    
    <!-- Finish Hard Intro -->
    <div id="intro-container" class="card stage5-card parchment-large" style="text-align:center;">
      <h1 style="font-size:3.5rem; color:var(--ink); margin-bottom:1rem; letter-spacing:3px; text-transform:uppercase;">Finish Hard</h1>
      <p style="font-size:1.5rem; color:#305e19; margin-bottom:3rem; line-height:1.6; font-style:italic;">
        In this final closing test, the definition of the word will be given. You must rapidly deduce and choose the correct word from the options mixed with distractors.
      </p>
      <button id="start-btn" class="classic-btn" style="width:100%; max-width:300px;">Commence Final Test</button>
    </div>

    <!-- Quiz Container -->
    <div id="quiz-container" class="card stage5-card parchment-large" style="display:none;">
      <div class="s5-header">
        <h2>Multiple Choice</h2>
        <div id="quiz-progress" style="font-size:1.5rem; font-weight:bold;">1/5</div>
      </div>
      
      <div class="meaning-display" id="r5-meaning">
        <!-- Meaning goes here -->
      </div>
      
      <div class="options-grid" id="options-container">
        <!-- 4 buttons go here -->
      </div>
      
      <div id="r5-feedback" class="feedback"></div>
      
      <div style="text-align:center;">
         <button id="next-btn" class="classic-btn secondary" style="display:none; width:100%; max-width:300px; margin-top:2rem;">Next Question</button>
      </div>
    </div>
    
  </div>
  <script src="shared.js"></script>
  <script src="round5.js"></script>
</body>
</html>
