<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Find Score</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .results-card { max-width: 800px; margin: auto; padding: 3rem; text-align: center; }
    .res-header h2 { font-size: 3rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px dashed var(--text-secondary); padding-bottom: 1rem; color: var(--text-main); }
    .res-subtitle { font-size: 1.5rem; font-style: italic; color: var(--accent-primary); margin-bottom: 2rem; }
    
    .score-container { margin: 3rem 0; padding: 2rem; background: var(--bg-light); border-radius: 8px; border: 4px solid var(--accent-primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .score-label { font-size: 1.5rem; color: var(--accent-primary); font-family: var(--font-serif); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; }
    .score-value { font-size: 5rem; color: var(--bg-light); font-weight: bold; font-family: monospace; text-shadow: 0 4px 8px rgba(0,0,0,0.8); }
    
    .words-learned { text-align: left; margin-top: 3rem; background: rgba(0,0,0,0.03); padding: 2rem; border-radius: 4px; border-left: 5px solid var(--accent-primary); }
    .words-learned h3 { font-size: 2rem; border-bottom: 1px solid var(--text-secondary); padding-bottom: 0.5rem; margin-bottom: 1.5rem; color: var(--text-main); font-family: var(--font-serif); }
    .word-item { margin-bottom: 1.5rem; }
    .word-item strong { display: block; font-size: 1.8rem; color: var(--text-main); text-transform: uppercase; margin-bottom: 0.3rem; letter-spacing: 1px; }
    .word-item p { margin: 0; font-size: 1.2rem; font-style: italic; color: var(--accent-primary); line-height: 1.6; }
    
    .menu-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 3rem; }
    .menu-buttons .classic-btn { width: auto; padding: 1rem 2rem; }
    @media (max-width: 600px) { .menu-buttons { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="card results-card parchment-large">
      <div class="res-header">
        <h2>Find Score</h2>
      </div>
      <p class="res-subtitle">You finished this run. Here is how you did.</p>
      
      <div class="score-container">
        <div class="score-label">Final Intelligence Score</div>
        <div class="score-value" id="res-score">0</div>
        <div id="res-rank" style="font-size: 2rem; color: var(--accent-red); font-family: var(--font-serif); margin-top:1rem; opacity:0; transition: opacity 1s ease;">Rank</div>
        <div id="res-total-time" style="font-size: 1.2rem; color: var(--text-secondary); margin-top: 1rem; font-weight: bold;">Total Time: 0:00</div>
        <div id="res-start-time" style="font-size: 1rem; color: var(--text-secondary); margin-top: 0.4rem;">Started: N/A</div>
        <div id="res-end-time" style="font-size: 1rem; color: var(--text-secondary); margin-top: 0.2rem;">Ended: N/A</div>
      </div>
      <div class="words-learned" style="margin-top: 1.5rem;">
        <h3>Stage Scores</h3>
        <div id="res-stage-scores"></div>
      </div>
      
      <div class="words-learned">
        <h3>Assimilated words</h3>
        <div id="res-words-list"></div>
      </div>
      
      <div class="menu-buttons">
        <button id="play-again-btn" class="classic-btn">Play Again</button>
        <button id="go-home-btn" class="classic-btn secondary">Return to Home</button>
      </div>
    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="10_results.js"></script>
</body>
</html>
