<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Master's Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .results-card { max-width: 800px; margin: auto; padding: 3rem; text-align: center; }
    .res-header h2 { font-size: 3rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px dashed var(--ink-light); padding-bottom: 1rem; color: var(--ink); }
    .res-subtitle { font-size: 1.5rem; font-style: italic; color: #305e19; margin-bottom: 2rem; }
    
    .score-container { margin: 3rem 0; padding: 2rem; background: linear-gradient(135deg, var(--ink), #1a1208); border-radius: 8px; border: 4px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .score-label { font-size: 1.5rem; color: var(--gold); font-family: var(--font-serif); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; }
    .score-value { font-size: 5rem; color: #fdfbf7; font-weight: bold; font-family: monospace; text-shadow: 0 4px 8px rgba(0,0,0,0.8); }
    
    .words-learned { text-align: left; margin-top: 3rem; background: rgba(0,0,0,0.03); padding: 2rem; border-radius: 4px; border-left: 5px solid var(--gold); }
    .words-learned h3 { font-size: 2rem; border-bottom: 1px solid var(--ink-light); padding-bottom: 0.5rem; margin-bottom: 1.5rem; color: var(--ink); font-family: var(--font-serif); }
    .word-item { margin-bottom: 1.5rem; }
    .word-item strong { display: block; font-size: 1.8rem; color: var(--ink); text-transform: uppercase; margin-bottom: 0.3rem; letter-spacing: 1px; }
    .word-item p { margin: 0; font-size: 1.2rem; font-style: italic; color: #305e19; line-height: 1.6; }
    
    .menu-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 3rem; }
    .menu-buttons .classic-btn { width: auto; padding: 1rem 2rem; }
    @media (max-width: 600px) { .menu-buttons { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="card results-card parchment-large">
      <div class="res-header">
        <h2>Archival Summary</h2>
      </div>
      <p class="res-subtitle">The intellectual trial is complete. You have proven your ultimate mastery.</p>
      
      <div class="score-container">
        <div class="score-label">Final Intelligence Score</div>
        <div class="score-value" id="res-score">0</div>
        <div id="res-rank" style="font-size: 2rem; color: var(--accent-red); font-family: var(--font-serif); margin-top:1rem; opacity:0; transition: opacity 1s ease;">Rank</div>
        <div id="res-stats" style="font-size: 1.2rem; color: #fdfbf7; margin-top: 0.5rem; opacity:0; transition: opacity 1s ease; letter-spacing:1px;">Accuracy: 0%</div>
      </div>
      
      <div class="words-learned">
        <h3>Assimilated Lexicon</h3>
        <div id="res-words-list"></div>
      </div>
      
      <div class="menu-buttons">
        <button id="play-again-btn" class="classic-btn">Commence New Trial</button>
        <button id="go-home-btn" class="classic-btn secondary">Return to Library</button>
      </div>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="results.js"></script>
</body>
</html>
